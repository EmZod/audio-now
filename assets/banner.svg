<svg xmlns="http://www.w3.org/2000/svg" width="960" height="230" viewBox="0 0 960 230" role="img" aria-label="audio-now — local voice for coding agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f14"/>
      <stop offset="1" stop-color="#131a22"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ff6b4a"/>
      <stop offset="1" stop-color="#ffc46b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="230" rx="14" fill="url(#bg)"/>
  <rect width="960" height="230" rx="14" fill="none" stroke="#243040" stroke-width="1.5"/>

  <!-- waveform -->
  <g fill="url(#wave)" opacity="0.95">
    <rect x="64"  y="103" width="9" height="24"  rx="4.5"/>
    <rect x="82"  y="88"  width="9" height="54"  rx="4.5"/>
    <rect x="100" y="66"  width="9" height="98"  rx="4.5"/>
    <rect x="118" y="47"  width="9" height="136" rx="4.5"/>
    <rect x="136" y="72"  width="9" height="86"  rx="4.5"/>
    <rect x="154" y="94"  width="9" height="42"  rx="4.5"/>
    <rect x="172" y="60"  width="9" height="110" rx="4.5"/>
    <rect x="190" y="83"  width="9" height="64"  rx="4.5"/>
    <rect x="208" y="105" width="9" height="20"  rx="4.5"/>
    <rect x="226" y="96"  width="9" height="38"  rx="4.5"/>
    <rect x="244" y="110" width="9" height="10"  rx="4.5"/>
  </g>

  <!-- wordmark -->
  <text x="296" y="106" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace"
        font-size="56" font-weight="700" fill="#f2f5f8" letter-spacing="-1">audio-now</text>
  <text x="299" y="142" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace"
        font-size="18" fill="#c9d4df">sounds like a real person · local</text>
  <text x="299" y="168" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace"
        font-size="18" fill="#8fa0b3">agent-first · warm in 0.4s</text>

  <!-- prompt chip -->
  <g font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="16">
    <rect x="298" y="182" width="400" height="30" rx="7" fill="#0e1721" stroke="#243040"/>
    <text x="312" y="203" fill="#5cd18a">$</text>
    <text x="330" y="203" fill="#c6d2de">audio say "ship it"</text>
    <text x="612" y="203" fill="#5b6b7c">♪ 0.42s</text>
  </g>
</svg>
